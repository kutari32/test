<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたへのメッセージ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap" rel="stylesheet">
    <style>
        :root {
            --env-bg: #fffbf0;    
            --env-accent: #f7f0e3; 
            --paper-white: #ffffff;
            --bg-soft-pink: #fff5f7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-soft-pink);
            font-family: 'Sawarabi Gothic', sans-serif;
            overflow: hidden;
            cursor: pointer;
        }

        /* 案内テキスト */
        #instruction {
            position: absolute;
            top: 15%;
            text-align: center;
            color: #b19494;
            z-index: 100;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        body.open #instruction {
            opacity: 0;
            transform: translateY(-30px);
            pointer-events: none;
        }

        /* 全体を包むコンテナ */
        .wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 封筒本体：開封前のみふわふわ */
        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            animation: floating 3s ease-in-out infinite; 
        }

        /* 開封したら封筒全体の動きを止める */
        body.open .envelope {
            animation: none;
        }

        /* 封筒のパーツ共通：transitionを追加 */
        .flap, .pocket-front, .pocket-back {
            position: absolute;
            transition: transform 0.8s ease, opacity 1.5s ease;
        }

        /* 封筒の蓋 */
        .flap {
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 120px solid var(--env-bg);
            transform-origin: top;
            z-index: 30; /* 手紙より上 */
        }

        /* 封筒の後ろ側（中身の土台） */
        .pocket-back {
            top: 0; left: 0;
            width: 300px; height: 200px;
            background-color: var(--env-accent);
            border-radius: 0 0 15px 15px;
            z-index: 5;
        }

        /* 封筒の前面（手紙を隠すポケット） */
        .pocket-front {
            bottom: 0; left: 0;
            width: 300px; height: 200px;
            background-color: var(--env-bg);
            clip-path: polygon(0 0, 15% 0, 50% 50%, 85% 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 0 15px 15px;
            z-index: 20; /* 手紙より上 */
        }

        /* 手紙（画像） */
        .letter {
            position: absolute;
            bottom: 10px;
            width: 260px;
            height: 180px;
            background-color: var(--paper-white);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            z-index: 10; /* 初期は封筒の中 */
            opacity: 0;
            visibility: hidden;
            overflow: hidden;
        }

        .letter img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        /* --- 開封アクション --- */
        
        /* bodyに.openがついたらアニメーション開始 */
        
        /* 蓋が開く */
        body.open .flap {
            transform: rotateX(180deg);
            z-index: 1; /* 手紙の後ろへ */
        }

        /* 風に舞い上がり、最後は静止する */
        body.open .letter {
            visibility: visible;
            opacity: 1;
            animation: windDance 3.5s cubic-bezier(0.45, 0, 0.55, 1) forwards;
            animation-delay: 0.6s;
        }

        /* 【修正点】背景の封筒パーツだけを薄くする */
        body.open .flap,
        body.open .pocket-front,
        body.open .pocket-back {
            opacity: 0.2;
            /* 舞い上がる手紙の邪魔にならないようにz-indexをさらに下げる */
            transition-delay: 1.5s; /* 手紙が飛び出し始めてから薄くする */
        }

        @keyframes windDance {
            0% { 
                transform: translate(0, 0) rotate(0deg) scale(1); 
                z-index: 10; 
            }
            20% { 
                transform: translate(-40px, -120px) rotate(-15deg) scale(1.2); 
                z-index: 50; /* 封筒より手前に */
            }
            45% { 
                transform: translate(60px, -240px) rotate(20deg) scale(1.8); 
                z-index: 50;
            }
            70% { 
                transform: translate(-50px, -180px) rotate(-10deg) scale(2.5); 
                z-index: 50;
            }
            100% { 
                /* 正面で静止 */
                transform: translate(0, -100px) rotate(0deg) scale(3.5); 
                z-index: 50; 
                box-shadow: 0 30px 80px rgba(0,0,0,0.15);
            }
        }

        /* ふわふわアニメーション */
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body onclick="openEnvelope()">

    <div id="instruction">
        <h1 style="font-weight: normal; margin: 0;">あなたへのメッセージがあります</h1>
        <p style="margin-top: 10px; opacity: 0.8;">画面をタップして開けてね</p>
    </div>

    <div class="wrapper">
        <div class="envelope">
            <div class="flap"></div>
            <div class="pocket-back"></div>
            <div class="letter">
                <img src="test.png" alt="Special Message">
            </div>
            <div class="pocket-front"></div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            if (!document.body.classList.contains('open')) {
                document.body.classList.add('open');
                // JavaScriptでのopacity操作は不要になったので削除
            }
        }
    </script>
</body>
</html>
