<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたへのメッセージ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap" rel="stylesheet">
    <style>
        :root {
            --env-bg: #fffbf0;    
            --env-accent: #f7f0e3; 
            --paper-white: #ffffff;
            --bg-soft-pink: #fff5f7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-soft-pink);
            font-family: 'Sawarabi Gothic', sans-serif;
            overflow: hidden;
            cursor: pointer;
        }

        /* 案内テキスト：タップ後にスッと消える */
        #instruction {
            position: absolute;
            top: 15%;
            text-align: center;
            color: #b19494;
            z-index: 100;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        body.open #instruction {
            opacity: 0;
            transform: translateY(-30px);
            pointer-events: none;
        }

        /* 全体を包むコンテナ */
        .wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 封筒本体 */
        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--env-accent);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            animation: floating 3s ease-in-out infinite; /* 開封前のみふわふわ */
            transition: opacity 1.5s ease;
        }

        /* 開封したら封筒の動きを止める */
        body.open .envelope {
            animation: none;
        }

        .flap {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 120px solid var(--env-bg);
            transform-origin: top;
            transition: transform 0.8s ease;
            z-index: 30;
        }

        .pocket {
            position: absolute;
            bottom: 0; left: 0;
            width: 300px; height: 200px;
            background-color: var(--env-bg);
            clip-path: polygon(0 0, 15% 0, 50% 50%, 85% 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 0 15px 15px;
            z-index: 20;
        }

        /* 手紙（画像） */
        .letter {
            position: absolute;
            bottom: 10px;
            width: 260px;
            height: 180px;
            background-color: var(--paper-white);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            /* 手紙の中身がはみ出さないように */
            overflow: hidden;
        }

        .letter img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        /* --- 開封アクション --- */
        body.open .flap {
            transform: rotateX(180deg);
            z-index: 5;
        }

        /* 風に舞い上がり、最後は静止するアニメーション */
        body.open .letter {
            visibility: visible;
            opacity: 1;
            /* forwardsを指定することで、最後のアニメーション状態を維持します */
            animation: windDance 3.5s cubic-bezier(0.45, 0, 0.55, 1) forwards;
            animation-delay: 0.6s;
        }

        @keyframes windDance {
            0% { 
                transform: translate(0, 0) rotate(0deg) scale(1); 
                z-index: 10; 
            }
            20% { 
                transform: translate(-40px, -120px) rotate(-15deg) scale(1.2); 
                z-index: 50; 
            }
            45% { 
                transform: translate(60px, -240px) rotate(20deg) scale(1.8); 
            }
            70% { 
                transform: translate(-50px, -180px) rotate(-10deg) scale(2.5); 
            }
            100% { 
                /* ここでピタッと静止 */
                transform: translate(0, -100px) rotate(0deg) scale(3.5); 
                z-index: 50; 
                box-shadow: 0 30px 80px rgba(0,0,0,0.15);
            }
        }

        /* 待機中のふわふわアニメーション */
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body onclick="openEnvelope()">

    <div id="instruction">
        <h1 style="font-weight: normal; margin: 0;">あなたへのメッセージがあります</h1>
        <p style="margin-top: 10px; opacity: 0.8;">画面をタップして開けてね</p>
    </div>

    <div class="wrapper">
        <div class="envelope" id="env-body">
            <div class="flap"></div>
            <div class="letter">
                <img src="test.png" alt="Special Message">
            </div>
            <div class="pocket"></div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            if (!document.body.classList.contains('open')) {
                document.body.classList.add('open');
                
                const envBody = document.getElementById('env-body');
                // 手紙が出てきた後、背景の封筒を少し薄くして手紙を強調
                setTimeout(() => {
                    envBody.style.transition = "opacity 2s ease";
                    envBody.style.opacity = "0.2";
                }, 1500);
            }
        }
    </script>
</body>
</html>
