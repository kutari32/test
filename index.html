<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あなたへのメッセージ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Gothic&display=swap" rel="stylesheet">
    <style>
        :root {
            --env-bg: #fffbf0;    
            --env-accent: #f7f0e3; 
            --paper-white: #ffffff;
            --bg-soft-pink: #fff5f7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-soft-pink);
            font-family: 'Sawarabi Gothic', sans-serif;
            overflow: hidden;
            cursor: pointer;
            /* タップ時の青い枠を消す（スマホ用） */
            -webkit-tap-highlight-color: transparent;
        }

        /* 案内テキスト */
        #instruction {
            position: absolute;
            top: 15%;
            width: 90%;
            text-align: center;
            color: #b19494;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        body.open #instruction {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        /* 全体を包むコンテナ */
        .wrapper {
            position: relative;
            width: 260px; /* スマホ向けに少し小さく */
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            animation: floating 3s ease-in-out infinite; 
        }

        body.open .envelope {
            animation: none;
        }

        .flap, .pocket-front, .pocket-back {
            position: absolute;
            transition: transform 0.8s ease, opacity 1.5s ease;
        }

        .flap {
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 130px solid transparent;
            border-right: 130px solid transparent;
            border-top: 100px solid var(--env-bg);
            transform-origin: top;
            z-index: 30;
        }

        .pocket-back {
            top: 0; left: 0;
            width: 260px; height: 180px;
            background-color: var(--env-accent);
            border-radius: 0 0 15px 15px;
            z-index: 5;
        }

        .pocket-front {
            bottom: 0; left: 0;
            width: 260px; height: 180px;
            background-color: var(--env-bg);
            clip-path: polygon(0 0, 15% 0, 50% 50%, 85% 0, 100% 0, 100% 100%, 0 100%);
            border-radius: 0 0 15px 15px;
            z-index: 20;
        }

        /* 手紙（画像）：スマホ画面で見切れないサイズ */
        .letter {
            position: absolute;
            bottom: 5px;
            width: 240px;
            height: 170px;
            background-color: var(--paper-white);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            overflow: hidden;
        }

        .letter img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 画像全体が表示されるように */
            border-radius: 4px;
        }

        /* 開封アクション */
        body.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        body.open .letter {
            visibility: visible;
            opacity: 1;
            animation: windDance 3.5s cubic-bezier(0.45, 0, 0.55, 1) forwards;
            animation-delay: 0.6s;
        }

        /* 封筒パーツを薄くする */
        body.open .flap,
        body.open .pocket-front,
        body.open .pocket-back {
            opacity: 0.15;
            transition-delay: 1.5s;
        }

        @keyframes windDance {
            0% { 
                transform: translate(0, 0) rotate(0deg) scale(1); 
                z-index: 10; 
            }
            20% { 
                transform: translate(-30px, -80px) rotate(-10deg) scale(1.1); 
                z-index: 50;
            }
            45% { 
                transform: translate(40px, -150px) rotate(15deg) scale(1.2); 
            }
            70% { 
                transform: translate(-30px, -120px) rotate(-5deg) scale(1.3); 
            }
            100% { 
                /* スマホで全体が見える位置と大きさ（scaleを調整） */
                transform: translate(0, -60px) rotate(0deg) scale(1.35); 
                z-index: 50; 
                box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* さらに小さい画面（古いiPhoneなど）向けの微調整 */
        @media (max-width: 350px) {
            @keyframes windDance {
                100% { transform: translate(0, -60px) rotate(0deg) scale(1.15); }
            }
        }
    </style>
</head>
<body onclick="openEnvelope()">

    <div id="instruction">
        <h1 style="font-weight: normal; font-size: 1.2rem; margin: 0;">あなたへのメッセージがあります</h1>
        <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">画面をタップして開けてね</p>
    </div>

    <div class="wrapper">
        <div class="envelope">
            <div class="flap"></div>
            <div class="pocket-back"></div>
            <div class="letter">
                <img src="test.png" alt="Special Message">
            </div>
            <div class="pocket-front"></div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            if (!document.body.classList.contains('open')) {
                document.body.classList.add('open');
            }
        }
    </script>
</body>
</html>
